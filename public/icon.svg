<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="200" y1="120" x2="900" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0E1B2E"/>
    </linearGradient>

    <linearGradient id="blueTeal" x1="300" y1="300" x2="800" y2="800">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="softGlass" x1="400" y1="350" x2="700" y2="700">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <g filter="url(#softShadow)">
    <rect x="330" y="360" width="360" height="260" rx="48" fill="url(#softGlass)" stroke="url(#blueTeal)" stroke-opacity="0.35"/>
    <rect x="300" y="330" width="360" height="260" rx="48" fill="url(#softGlass)" opacity="0.85"/>
    <rect x="270" y="300" width="360" height="260" rx="48" fill="url(#softGlass)" opacity="0.65"/>
  </g>

  <g opacity="0.95">
    <circle cx="690" cy="520" r="78" stroke="#2DD4BF" stroke-width="18" fill="none"/>
    <rect x="740" y="570" width="110" height="18" rx="9" transform="rotate(35 740 570)" fill="#3B82F6"/>
  </g>

  <g opacity="0.9">
    <path d="M360 700 C320 640 340 560 410 530" stroke="#F59E0B" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M410 530 L374 532 L390 564 Z" fill="#F59E0B"/>
  </g>

  <rect x="64" y="64" width="896" height="896" rx="200" fill="white" opacity="0.04"/>
</svg>
